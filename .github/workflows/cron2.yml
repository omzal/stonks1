name: cron2

on:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cron
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  cron:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Show environment
        run: |
          python --version
          pip --version
          google-chrome --version || true
          ls -la
          echo "Symbols files:"
          find ./symbols -maxdepth 1 -type f -name "*.json" -print || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ./requirements.txt
          python -m pip install --force-reinstall "blinker<1.8"
          python -m pip freeze
          python -c "from seleniumwire import webdriver; print('seleniumwire import OK')"

      - name: Run Sync
        run: |
          python -u main.py

      - name: Show generated dist folder
        if: always()
        run: |
          echo "Dist folder contents:"
          find ./dist -maxdepth 3 -type f -print || true

      - name: Deploy
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
